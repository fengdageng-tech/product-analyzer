<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>跨境产品开发 · 分析报告工具</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2338bdf8'/%3E%3Cstop offset='100%25' style='stop-color:%23a78bfa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Crect x='12' y='14' width='40' height='36' rx='4' fill='white' fill-opacity='0.15'/%3E%3Cline x1='18' y1='22' x2='46' y2='22' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3Cline x1='18' y1='28' x2='38' y2='28' stroke='white' stroke-width='3' stroke-linecap='round' stroke-opacity='0.7'/%3E%3Cline x1='18' y1='34' x2='42' y2='34' stroke='white' stroke-width='3' stroke-linecap='round' stroke-opacity='0.5'/%3E%3Ccircle cx='37' cy='41' r='7' fill='%234ade80' stroke='white' stroke-width='2.5'/%3E%3Cpolyline points='33,41 36,44 41,38' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --purple: #a78bfa;
    --input-bg: #0f172a;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 16px;
    max-width: 680px;
    margin: 0 auto;
  }

  h1 {
    font-size: 20px;
    text-align: center;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab {
    flex: 1; text-align: center; padding: 10px 8px; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; background: var(--card);
    border: 1px solid var(--border); color: var(--muted); transition: all 0.2s;
  }
  .tab.active { background: var(--accent); color: #0f172a; border-color: var(--accent); }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Form */
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--muted); }
  label .unit { font-weight: 400; color: var(--muted); }
  input, textarea, select {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--input-bg); color: var(--text); font-size: 15px;
    font-family: inherit; resize: vertical; -webkit-appearance: none;
  }
  textarea { min-height: 80px; }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* Buttons */
  .btn {
    display: block; width: 100%; padding: 12px; border-radius: 8px; font-size: 15px;
    font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; text-align: center;
  }
  .btn-primary { background: var(--accent); color: #0f172a; }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); margin-top: 8px; }
  .btn-sm { display: inline; padding: 6px 14px; font-size: 12px; width: auto; border-radius: 6px; }
  .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer; }

  /* Report Card */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; margin-bottom: 14px;
  }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .product-name { font-size: 17px; font-weight: 700; line-height: 1.4; }
  .verdict {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
    white-space: nowrap; flex-shrink: 0; margin-left: 8px;
  }
  .verdict.go { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
  .verdict.wait { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
  .verdict.skip { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }

  .metric-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .metric {
    text-align: center; padding: 10px 6px; border-radius: 8px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  }
  .metric .value { font-size: 20px; font-weight: 800; }
  .metric .label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .metric .value.green { color: var(--green); }
  .metric .value.yellow { color: var(--yellow); }
  .metric .value.red { color: var(--red); }
  .metric .value.blue { color: var(--accent); }

  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; margin-top: 16px; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag {
    padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
    background: rgba(56,189,248,0.1); color: var(--accent); border: 1px solid rgba(56,189,248,0.2);
  }
  .tag.bad {
    background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2);
  }
  .tag.neutral {
    background: rgba(148,163,184,0.1); color: var(--muted); border: 1px solid rgba(148,163,184,0.2);
  }

  .reason-box {
    background: var(--input-bg); border-radius: 8px; padding: 14px;
    border-left: 3px solid var(--accent); font-size: 14px; line-height: 1.8;
  }
  .reason-box li { margin-left: 16px; margin-bottom: 4px; }
  .reason-box li::marker { color: var(--accent); }

  /* Product List */
  .product-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .product-item .body { flex: 1; min-width: 0; }
  .list-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); background: rgba(0,0,0,0.3); }
  .item-del { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; }
  .item-del:hover { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.1); }
  .product-item:active { border-color: var(--accent); }
  .product-item .top { display: flex; justify-content: space-between; align-items: center; }
  .product-item .name { font-weight: 700; font-size: 15px; flex: 1; }
  .product-item .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .product-item .actions { display: flex; gap: 6px; margin-top: 8px; }
  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #0f172a; padding: 10px 24px;
    border-radius: 20px; font-weight: 700; font-size: 14px; z-index: 999;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* File input */
  #importFile { display: none; }

  /* Ad row */
  .ad-row { display: flex; gap: 8px; align-items: flex-end; }
  .ad-row select { width: 130px; flex-shrink: 0; padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 14px; font-family: inherit; }
  .ad-row input { flex: 1; }
  .ad-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Competitor section */
  .collapsible { margin-bottom: 14px; }
  .collapsible-trigger { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--accent); cursor: pointer; padding: 10px 0; user-select: none; }
  .collapsible-trigger .arrow { transition: transform 0.2s; font-size: 10px; }
  .collapsible.open .arrow { transform: rotate(90deg); }
  .collapsible-body { display: none; }
  .collapsible.open .collapsible-body { display: block; }
  .competitor-card { background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative; }
  .competitor-card .remove-btn { position: absolute; top: 8px; right: 10px; width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--red); background: transparent; color: var(--red); font-size: 14px; cursor: pointer; line-height: 1; }
  .add-comp-btn { font-size: 12px; color: var(--accent); background: transparent; border: 1px dashed var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; width: 100%; font-family: inherit; }

  /* Comparison table */
  .comparison-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 12px 0; }
  .comparison-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px; }
  .comparison-table th { background: rgba(56,189,248,0.08); color: var(--accent); padding: 8px 6px; text-align: center; font-size: 11px; white-space: nowrap; }
  .comparison-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--border); }
  .comparison-table .highlight { color: var(--green); font-weight: 700; }
  .comparison-table .warn { color: var(--yellow); }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-card .stat-value { font-size: 22px; font-weight: 800; }
  .stat-card .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .stat-bar .seg { height: 100%; }
  .seg.go { background: var(--green); }
  .seg.wait { background: var(--yellow); }
  .seg.skip { background: var(--red); }

  /* Override */
  .override-bar { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .override-bar .btn-o { padding: 5px 12px; font-size: 11px; border-radius: 16px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); font-weight: 600; transition: all 0.15s; font-family: inherit; }
  .override-bar .btn-o.go-active { background: rgba(74,222,128,0.15); color: var(--green); border-color: var(--green); }
  .override-bar .btn-o.wait-active { background: rgba(251,191,36,0.15); color: var(--yellow); border-color: var(--yellow); }
  .override-bar .btn-o.skip-active { background: rgba(248,113,113,0.15); color: var(--red); border-color: var(--red); }
  .override-note { margin-top: 8px; }
  .override-note input { font-size: 13px; padding: 8px 12px; }
  .overridden-mark { font-size: 11px; color: var(--accent); margin-left: 4px; }

  /* Image upload */
  .image-upload-row { display: flex; gap: 8px; }
  .image-upload-row input { flex: 1; }
  .image-upload-row .btn-sm { white-space: nowrap; flex-shrink: 0; padding: 10px 16px; font-size: 13px; }
  .image-preview-wrap { margin-top: 8px; display: none; position: relative; }
  .image-preview-wrap.show { display: inline-block; }
  .image-preview-wrap img { width: 100%; max-width: 300px; border-radius: 8px; border: 1px solid var(--border); display: block; }
  .image-preview-wrap .clear-img { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; border-radius: 50%; background: var(--red); color: #fff; border: none; cursor: pointer; font-size: 14px; line-height: 1; }
  .card-img { width: 100%; max-height: 260px; object-fit: contain; border-radius: 8px; margin-bottom: 14px; background: rgba(0,0,0,0.3); }

  /* Export btn */
  .export-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn-export { flex: 1; padding: 8px; font-size: 12px; border-radius: 8px; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; font-weight: 600; font-family: inherit; }
  .btn-export:active { background: rgba(56,189,248,0.1); }

  /* Print */
  @media print {
    body { background: #fff; color: #000; max-width: 100%; padding: 0; }
    .tabs, .btn, .btn-export, .btn-outline, .btn-sm, .btn-danger, .export-row, .override-bar, .override-note, .collapsible-trigger, .add-comp-btn, .remove-btn, #reportOutput { margin: 0; }
    .card { border: 1px solid #ddd; break-inside: avoid; }
    .btn, .btn-export, .btn-outline, .btn-sm, .btn-danger, .export-row, .override-bar, .override-note { display: none !important; }
  }

  /* Responsive */
  @media (max-width: 400px) {
    .metric-grid { grid-template-columns: 1fr 1fr; }
    .row, .row-3 { grid-template-columns: 1fr; }
    .card-header { flex-direction: column; }
    .verdict { margin-left: 0; margin-top: 8px; align-self: flex-start; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .ad-row { flex-direction: column; align-items: stretch; }
    .ad-row select { width: 100%; }
  }
</style>
</head>
<body>

<h1>产品分析报告</h1>
<div class="subtitle">跨境产品开发 · 判断工具</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('analyze')">🔍 分析产品</div>
  <div class="tab" onclick="switchTab('history')">📋 历史记录</div>
</div>

<!-- ====== Analyze Panel ====== -->
<div class="panel active" id="panel-analyze">

  <div class="form-group">
    <label>产品名称</label>
    <input id="productName" placeholder="例：Sage Green Kitchen Towels Set of 2">
  </div>
  <div class="form-group">
    <label>ASIN</label>
    <input id="asin" placeholder="B0GCFJGVFG">
  </div>
  <div class="form-group">
    <label>产品主图 <span class="unit">(选填)</span></label>
    <div class="image-upload-row">
      <input id="imageUrl" placeholder="粘贴图片链接，或点击右侧上传" oninput="previewImageUrl()">
      <input type="file" id="imageFile" accept="image/*" onchange="handleImageUpload(event)" style="display:none;">
      <button class="btn btn-sm" onclick="document.getElementById('imageFile').click()" type="button">📁 上传</button>
    </div>
    <div class="image-preview-wrap" id="imagePreview">
      <img id="imagePreviewImg" alt="主图预览">
      <button class="clear-img" onclick="clearImage()" type="button">✕</button>
    </div>
  </div>
  <div class="row-3">
    <div class="form-group">
      <label>售价 <span class="unit">($)</span></label>
      <input id="price" type="number" step="0.01" placeholder="17.99">
    </div>
    <div class="form-group">
      <label>月销量</label>
      <input id="monthlySales" type="number" placeholder="2010">
    </div>
    <div class="form-group">
      <label>评论数</label>
      <input id="reviewCount" type="number" placeholder="26">
    </div>
  </div>
  <div class="row">
    <div class="form-group">
      <label>评分</label>
      <input id="rating" type="number" step="0.1" min="1" max="5" placeholder="3.9">
    </div>
    <div class="form-group">
      <label>1688采购成本 <span class="unit">(¥ 人民币)</span></label>
      <input id="cost1688" type="number" step="0.01" placeholder="10.50">
    </div>
  </div>
  <div class="form-group">
    <label>广告成本 <span class="unit">(选填)</span></label>
    <div class="ad-row">
      <select id="adType" onchange="toggleAdInput()">
        <option value="">不投广告</option>
        <option value="acos">ACoS (%)</option>
        <option value="cpc">CPC ($)</option>
      </select>
      <input id="adValue" type="number" step="0.1" placeholder="15" style="display:none">
    </div>
    <div class="ad-hint" id="adHint"></div>
  </div>
  <div class="form-group">
    <label>差评内容 <span class="unit">(每条一行，粘贴关键词或原文)</span></label>
    <textarea id="negativeReviews" placeholder="面料太薄，吸水性差&#10;颜色跟图片不一样&#10;太薄了不值这个价&#10;当装饰还行，吸水不行"></textarea>
  </div>

  <!-- Competitor comparison -->
  <div class="collapsible" id="competitorSection">
    <div class="collapsible-trigger" onclick="toggleCompetitor()">
      <span class="arrow">▶</span> 添加竞品对比 <span style="font-size:11px;color:var(--muted)">(最多2个)</span>
    </div>
    <div class="collapsible-body" id="competitorBody"></div>
  </div>

  <button class="btn btn-primary" onclick="generateReport()">⚡ 生成分析报告</button>

  <!-- Report output -->
  <div id="reportOutput" style="margin-top: 20px;"></div>
</div>

<!-- ====== History Panel ====== -->
<div class="panel" id="panel-history">
  <div id="statsPanel"></div>
  <div style="display: flex; gap: 8px; margin-bottom: 16px;">
    <button class="btn btn-outline btn-sm" style="flex:1" onclick="document.getElementById('importFile').click()">📥 导入</button>
    <button class="btn btn-outline btn-sm" style="flex:1" onclick="exportData()">📤 导出</button>
    <button class="btn btn-outline btn-sm" style="flex:1; border-color: var(--red); color: var(--red)" onclick="clearAll()">🗑 清空</button>
  </div>
  <input type="file" id="importFile" accept=".json" onchange="importData(event)">
  <div id="productList"></div>
</div>

<script>
// ==================== DATA LAYER ====================
const STORAGE_KEY = 'product_analyzer_db';

function loadProducts() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { return []; }
}

function saveProducts(products) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
}

// ==================== ANALYSIS ENGINE ====================
function analyzeProduct(data) {
  const price = parseFloat(data.price) || 0;
  const sales = parseInt(data.monthlySales) || 0;
  const reviews = parseInt(data.reviewCount) || 0;
  const rating = parseFloat(data.rating) || 0;
  const costCNY = parseFloat(data.cost1688) || 0;
  const costUSD = costCNY / 7.25;

  // FBA fee estimate by typical small/standard items
  const referralFee = price * 0.15;
  let fbaFee = 3.50;
  if (price > 15 && price < 25) fbaFee = 4.50;
  if (price >= 25 && price < 40) fbaFee = 5.20;
  if (price >= 40) fbaFee = 6.00;

  const landedRevenue = price - referralFee - fbaFee;
  const shippingPerUnit = 0.45;
  const grossProfit = landedRevenue - costUSD - shippingPerUnit;
  const grossMargin = price > 0 ? (grossProfit / price) * 100 : 0;

  const beUnits = grossProfit > 0 ? Math.ceil(costUSD * 30 / grossProfit) : Infinity;
  const beDays = sales > 0 && beUnits !== Infinity ? Math.ceil(beUnits / (sales / 30)) : Infinity;

  // Ad cost
  const adCostType = data.adCostType || null;
  const adCostValue = parseFloat(data.adCostValue) || 0;
  let adSpend = 0;
  if (adCostType === 'acos' && adCostValue > 0) { adSpend = price * (adCostValue / 100); }
  if (adCostType === 'cpc' && adCostValue > 0) { adSpend = adCostValue; }
  const netProfit = grossProfit - adSpend;
  const netMargin = price > 0 ? (netProfit / price) * 100 : 0;

  // Review threshold
  let reviewLevel, reviewLabel;
  if (reviews < 100) { reviewLevel = 'green'; reviewLabel = '低门槛 · 新品可进'; }
  else if (reviews < 300) { reviewLevel = 'yellow'; reviewLabel = '中等门槛 · 需差异化'; }
  else { reviewLevel = 'red'; reviewLabel = '高壁垒 · 不推荐切入'; }

  // Rating assessment
  let ratingLevel;
  if (rating >= 4.3) ratingLevel = 'green';
  else if (rating >= 3.8) ratingLevel = 'yellow';
  else ratingLevel = 'red';

  // Negative review analysis
  const rawText = data.negativeReviews || '';
  const lines = rawText.split(/[\n,，。、；;]+/).filter(l => l.trim());
  const keywords = [
    { word: '薄|透|太轻|单薄', cat: '面料偏薄', type: 'bad' },
    { word: '吸水性|吸水|不吸水|水渍', cat: '吸水性差', type: 'bad' },
    { word: '颜色|色差|掉色|褪色|染色', cat: '颜色/色差', type: 'bad' },
    { word: '尺寸|太小|太大|长度|宽度|短|长|偏小|偏大', cat: '尺寸偏差', type: 'bad' },
    { word: '包装|破损|碎了|压坏|变形|物流', cat: '包装/运输', type: 'bad' },
    { word: '味道|气味|异味|臭|甲醛', cat: '异味', type: 'bad' },
    { word: '质量|太差|劣质|粗糙|不值', cat: '质量感差', type: 'bad' },
    { word: '电池|没电|充电|续航|发烫|短路', cat: '电池/电路', type: 'bad' },
    { word: '安装|不好装|装不上|不稳|晃动', cat: '安装困难', type: 'bad' },
    { word: '粘|不粘|脱落|粘性|胶水|贴不住', cat: '粘性不足', type: 'bad' },
    { word: '掉毛|起球|缩水|变形|起皱|掉色|褪色', cat: '面料耐久性', type: 'bad' },
    { word: '拉链|扣子|缝线|开线|线头|拉链坏', cat: '做工细节', type: 'bad' },
    { word: '噪音|太吵|声音大|吵|静音|嗡嗡', cat: '噪音问题', type: 'bad' },
    { word: '生锈|掉漆|氧化|变色|发黄|褪色', cat: '材质老化', type: 'bad' },
    { word: '划痕|瑕疵|二手|用过|翻新|拆过', cat: '品控/翻新', type: 'bad' },
    { word: '说明书|看不懂|没有英文|英文说明|不会用|操作', cat: '使用说明', type: 'bad' },
    { word: '过敏|起疹|皮肤|痒|红肿|刺激', cat: '过敏反应', type: 'bad' },
    { word: '售后|退货|退款|客服|不理人|联系不上', cat: '售后体验', type: 'bad' },
    { word: '清洗|洗|不耐洗|洗衣机|手洗', cat: '清洗便利性', type: 'neutral' },
    { word: '漂亮|好看|精致|可爱|喜欢|满意|不错|推荐|值|好评|棒|完美|惊喜|很好|完美', cat: '正向评价', type: 'good' },
    { word: '装饰|摆件|好看就行|当装饰|外观|颜值', cat: '装饰用途', type: 'neutral' },
  ];

  const categories = {};
  let categorized = 0;
  lines.forEach(line => {
    let matched = false;
    for (const kw of keywords) {
      if (new RegExp(kw.word, 'i').test(line)) {
        if (!categories[kw.cat]) categories[kw.cat] = { count: 0, type: kw.type, examples: [] };
        categories[kw.cat].count++;
        if (categories[kw.cat].examples.length < 2) categories[kw.cat].examples.push(line.trim().slice(0, 30));
        matched = true;
        categorized++;
        break;
      }
    }
    if (!matched) {
      if (!categories['其他']) categories['其他'] = { count: 0, type: 'neutral', examples: [] };
      categories['其他'].count++;
    }
  });

  const totalLines = lines.length;
  const badCategories = Object.entries(categories).filter(([_, v]) => v.type === 'bad').sort((a, b) => b[1].count - a[1].count);
  const topBad = badCategories.slice(0, 3);
  const fixableCategories = ['面料偏薄', '吸水性差', '颜色/色差', '尺寸偏差', '包装/运输', '异味', '质量感差', '安装困难', '粘性不足'];
  const hardCategories = ['电池/电路'];

  const fixableCount = badCategories.filter(([k]) => fixableCategories.includes(k)).reduce((s, [_, v]) => s + v.count, 0);
  const hardCount = badCategories.filter(([k]) => hardCategories.includes(k)).reduce((s, [_, v]) => s + v.count, 0);
  const totalBad = badCategories.reduce((s, [_, v]) => s + v.count, 0);

  // Verdict
  const useMargin = adSpend > 0 ? netMargin : grossMargin;
  let verdict, verdictClass;
  if (hardCount > 0 && hardCount / totalBad > 0.2) {
    verdict = '不做'; verdictClass = 'skip';
  } else if (useMargin <= 15) {
    verdict = '暂缓'; verdictClass = 'wait';
  } else if (reviews < 100 && fixableCount > 0 && useMargin > 25) {
    verdict = '能做'; verdictClass = 'go';
  } else if (reviews < 100 && fixableCount > 0 && useMargin > 20) {
    verdict = '能做'; verdictClass = 'go';
  } else if (reviews >= 300) {
    verdict = '不做'; verdictClass = 'skip';
  } else if (hardCount > 0) {
    verdict = '暂缓'; verdictClass = 'wait';
  } else {
    verdict = '暂缓'; verdictClass = 'wait';
  }

  return {
    price, sales, reviews, rating, costCNY, costUSD: costUSD.toFixed(2),
    referralFee: referralFee.toFixed(2), fbaFee: fbaFee.toFixed(2),
    landedRevenue: landedRevenue.toFixed(2), shippingPerUnit: shippingPerUnit.toFixed(2),
    grossProfit: grossProfit.toFixed(2), grossMargin: grossMargin.toFixed(1),
    adCostType, adCostValue, adSpend: adSpend.toFixed(2),
    netProfit: netProfit.toFixed(2), netMargin: netMargin.toFixed(1),
    beUnits, beDays,
    reviewLevel, reviewLabel, ratingLevel,
    categories, totalLines, badCategories, topBad,
    fixableCount, hardCount, totalBad,
    verdict, verdictClass,
  };
}

// ==================== UI RENDERING ====================
function generateReport() {
  const data = {
    productName: document.getElementById('productName').value.trim(),
    asin: document.getElementById('asin').value.trim(),
    price: document.getElementById('price').value,
    monthlySales: document.getElementById('monthlySales').value,
    reviewCount: document.getElementById('reviewCount').value,
    rating: document.getElementById('rating').value,
    cost1688: document.getElementById('cost1688').value,
    negativeReviews: document.getElementById('negativeReviews').value,
    adCostType: document.getElementById('adType').value || null,
    adCostValue: document.getElementById('adValue').value || null,
  };

  if (!data.productName) { showToast('⚠️ 请至少填写产品名称'); return; }
  if (!data.price || !data.cost1688) { showToast('⚠️ 售价和1688成本为必填项'); return; }

  const r = analyzeProduct(data);

  // Analyze competitors
  const competitors = [];
  document.querySelectorAll('.competitor-card').forEach(card => {
    const cData = {
      productName: card.querySelector('.comp-name')?.value?.trim() || '',
      price: card.querySelector('.comp-price')?.value || '',
      monthlySales: card.querySelector('.comp-sales')?.value || '',
      reviewCount: card.querySelector('.comp-reviews')?.value || '',
      rating: card.querySelector('.comp-rating')?.value || '',
      cost1688: card.querySelector('.comp-cost')?.value || '',
      negativeReviews: '',
    };
    if (cData.productName) {
      const cr = analyzeProduct(cData);
      competitors.push({ data: cData, result: cr });
    }
  });

  data.result = r;
  data.competitors = competitors;
  data.imageData = currentImageData || data.imageData || null;
  data.manualVerdict = data.manualVerdict || null;
  data.manualNote = data.manualNote || '';
  data.createdAt = new Date().toISOString();

  // Save
  const products = loadProducts();
  const existingIdx = products.findIndex(p => p.asin && p.asin === data.asin);
  if (existingIdx >= 0) {
    data.imageData = data.imageData || products[existingIdx].imageData || null;
    data.manualVerdict = data.manualVerdict || products[existingIdx].manualVerdict;
    data.manualNote = data.manualNote || products[existingIdx].manualNote || '';
    products[existingIdx] = data;
  } else {
    products.unshift(data);
  }
  saveProducts(products);

  renderReport(data, r);
  document.getElementById('reportOutput').scrollIntoView({ behavior: 'smooth' });
  showToast('✅ 报告已生成并保存');
}

function renderReport(data, r) {
  const colorMap = { green: 'green', yellow: 'yellow', red: 'red', blue: 'blue' };

    `<span class="tag bad">${cat} · ${info.count}条 (${r.totalLines > 0 ? Math.round(info.count/r.totalLines*100) : 0}%)</span>`
  ).join('');

  // Effective verdict (manual override wins)
  const effectiveVerdict = data.manualVerdict || r.verdict;
  const effectiveVerdictClass = effectiveVerdict === '能做' ? 'go' : effectiveVerdict === '不做' ? 'skip' : 'wait';
  const verdictText = { '能做': '✅ ' + effectiveVerdict, '暂缓': '⏸ ' + effectiveVerdict, '不做': '🚫 ' + effectiveVerdict };
  const overriddenMark = data.manualVerdict ? '<span class="overridden-mark">✎ 手动</span>' : '';

function renderProductList() {
  const products = loadProducts();
  const container = document.getElementById('productList');

  if (products.length === 0) {
    container.innerHTML = '<div class="empty-state">📭 暂无分析记录<br><span style="font-size:12px;">去「分析产品」页添加你的第一个产品</span></div>';
    return;
  }

  container.innerHTML = products.map((p, i) => {
    const r = p.result || {};
    const vLabel = r.verdict === '能做' ? '✅ 能做' : r.verdict === '不做' ? '🚫 不做' : '⏸ 暂缓';
    const date = p.createdAt ? new Date(p.createdAt).toLocaleDateString('zh-CN') : '未知';
    const imgHtml = p.imageData
      ? `<img class="list-thumb" src="${p.imageData.value.replace(/"/g, '&quot;')}" onerror="this.style.display='none'">`
      : '';
    return `
      <div class="product-item" onclick="viewProduct(${i})">
        ${imgHtml}
        <div class="body">
        <div class="top">
          <span class="name">${escapeHtml(p.productName || '未命名')}</span>
          <span style="font-size:12px;color:var(--muted);">${date}</span>
        </div>
        <div class="meta">
          ${p.asin ? 'ASIN: ' + escapeHtml(p.asin) + ' · ' : ''}
          销量${p.monthlySales || '?'} ·
          评论${p.reviewCount || '?'} ·
          ⭐${p.rating || '?'} ·
          ${p.price ? '$' + p.price : ''} ·
          ${vLabel}
        </div>
        </div>
        <button class="item-del" onclick="event.stopPropagation();deleteSingle(${i})" title="删除">🗑</button>
      </div>
    `;
  }).join('');
}

function viewProduct(index) {
  const products = loadProducts();
  const p = products[index];
  if (!p) return;

  // Fill form
  document.getElementById('productName').value = p.productName || '';
  document.getElementById('asin').value = p.asin || '';
  document.getElementById('price').value = p.price || '';
  document.getElementById('monthlySales').value = p.monthlySales || '';
  document.getElementById('reviewCount').value = p.reviewCount || '';
  document.getElementById('rating').value = p.rating || '';
  document.getElementById('cost1688').value = p.cost1688 || '';
  document.getElementById('negativeReviews').value = p.negativeReviews || '';
  if (p.adCostType) {
    document.getElementById('adType').value = p.adCostType;
    toggleAdInput();
    document.getElementById('adValue').value = p.adCostValue || '';
  } else {
    document.getElementById('adType').value = '';
    document.getElementById('adValue').style.display = 'none';
  }

  // Restore image (set input FIRST to avoid oninput triggering clearImage)
  if (p.imageData) {
    document.getElementById('imageUrl').value = p.imageData.type === 'url' ? p.imageData.value : '';
    currentImageData = p.imageData;
    showImagePreview(p.imageData.value);
  } else {
    clearImage();
  }

  switchTab('analyze');
  if (p.result) renderReport(p, p.result);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteProduct(id) {
  if (!confirm('确定删除这个产品的分析报告吗？')) return;
  let products = loadProducts();
  products = products.filter(p => (p.asin || p.productName) !== id);
  saveProducts(products);
  document.getElementById('reportOutput').innerHTML = '';
  showToast('已删除');
}

function deleteSingle(index) {
  const products = loadProducts();
  const p = products[index];
  if (!p) return;
  if (!confirm(`确定删除「${p.productName || '未命名'}」吗？`)) return;
  products.splice(index, 1);
  saveProducts(products);
  renderProductList();
  renderStats();
  showToast('已删除');
}

function clearAll() {
  if (!confirm('确定删除所有分析记录吗？此操作不可恢复。')) return;
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('reportOutput').innerHTML = '';
  renderProductList();
  showToast('已清空全部记录');
}

function exportData() {
  const products = loadProducts();
  if (products.length === 0) { showToast('⚠️ 没有数据可导出'); return; }
  const blob = new Blob([JSON.stringify(products, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '产品分析数据_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 导出成功');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('格式错误');
      const existing = loadProducts();
      const merged = [...data, ...existing];
      // dedup by asin
      const seen = new Set();
      const deduped = merged.filter(p => {
        const key = p.asin || p.productName || '';
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      saveProducts(deduped);
      renderProductList();
      showToast('📥 导入成功 · ' + deduped.length + '条记录');
    } catch(err) {
      showToast('⚠️ 文件格式错误');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ==================== NEW FEATURES ====================

// Image upload
let currentImageData = null; // { type: 'url'|'base64', value: string }

function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxW = 400;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      currentImageData = { type: 'base64', value: dataUrl };
      document.getElementById('imageUrl').value = '';
      showImagePreview(dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function previewImageUrl() {
  const url = document.getElementById('imageUrl').value.trim();
  if (url) {
    currentImageData = { type: 'url', value: url };
    showImagePreview(url);
  } else {
    clearImage();
  }
}

function showImagePreview(src) {
  document.getElementById('imagePreview').classList.add('show');
  document.getElementById('imagePreviewImg').src = src;
}

function clearImage() {
  currentImageData = null;
  document.getElementById('imagePreview').classList.remove('show');
  document.getElementById('imagePreviewImg').src = '';
  document.getElementById('imageUrl').value = '';
  document.getElementById('imageFile').value = '';
}

// Manual verdict override
function overrideVerdict(id, newVerdict) {
  const products = loadProducts();
  const p = products.find(p => (p.asin || p.productName) === id);
  if (!p) return;
  p.manualVerdict = newVerdict === p.result.verdict ? null : newVerdict;
  saveProducts(products);
  renderReport(p, p.result);
  showToast('判断已更新');
}

function saveOverrideNote(id, note) {
  const products = loadProducts();
  const p = products.find(p => (p.asin || p.productName) === id);
  if (!p) return;
  p.manualNote = note;
  saveProducts(products);
}

// Export as image
function exportImage() {
  const card = document.getElementById('report-card');
  if (!card) { showToast('⚠️ 先生成报告再导出'); return; }
  showToast('⏳ 生成图片中...');
  if (typeof html2canvas === 'undefined') {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    script.onload = () => doExport(card);
    document.head.appendChild(script);
  } else { doExport(card); }
}

function doExport(card) {
  html2canvas(card, { backgroundColor: '#0f172a', scale: 2 }).then(canvas => {
    const link = document.createElement('a');
    link.download = '产品分析报告_' + new Date().toISOString().slice(0,10) + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('📸 图片已保存');
  }).catch(() => showToast('⚠️ 导出失败'));
}

// Statistics panel
function renderStats() {
  const products = loadProducts();
  const panel = document.getElementById('statsPanel');
  if (!products.length) { panel.innerHTML = ''; return; }

  const total = products.length;
  const goCount = products.filter(p => {
    const v = (p.manualVerdict || p.result?.verdict || '');
    return v === '能做';
  }).length;
  const waitCount = products.filter(p => {
    const v = (p.manualVerdict || p.result?.verdict || '');
    return v === '暂缓';
  }).length;
  const skipCount = total - goCount - waitCount;

  const margins = products.map(p => parseFloat(p.result?.grossMargin) || 0).filter(m => m > 0);
  const avgMargin = margins.length ? (margins.reduce((a,b)=>a+b,0) / margins.length).toFixed(1) : '—';

  const dates = products.map(p => p.createdAt).filter(Boolean).sort();
  const latest = dates.length ? new Date(dates[dates.length - 1]).toLocaleDateString('zh-CN') : '—';

  const goPct = total > 0 ? Math.round(goCount/total*100) : 0;
  const waitPct = total > 0 ? Math.round(waitCount/total*100) : 0;
  const skipPct = total - goPct - waitPct;

  panel.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">📊 总分析数</div></div>
      <div class="stat-card"><div class="stat-value" style="color:var(--accent);">${avgMargin}%</div><div class="stat-label">📈 平均毛利率</div></div>
      <div class="stat-card">
        <div class="stat-value" style="font-size:14px;">
          <span style="color:var(--green);">✅${goCount}</span> <span style="color:var(--yellow);">⏸${waitCount}</span> <span style="color:var(--red);">🚫${skipCount}</span>
        </div>
        <div class="stat-label">能做 / 暂缓 / 不做</div>
        <div class="stat-bar">
          <div class="seg go" style="width:${goPct}%;"></div>
          <div class="seg wait" style="width:${waitPct}%;"></div>
          <div class="seg skip" style="width:${skipPct}%;"></div>
        </div>
      </div>
      <div class="stat-card"><div class="stat-value" style="font-size:16px;">${latest}</div><div class="stat-label">🕐 最近分析</div></div>
    </div>
  `;
}

// ==================== UTILS ====================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (name === 'analyze' && i === 0) || (name === 'history' && i === 1));
  });
  document.getElementById('panel-analyze').classList.toggle('active', name === 'analyze');
  document.getElementById('panel-history').classList.toggle('active', name === 'history');
  if (name === 'history') { renderStats(); renderProductList(); }
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
